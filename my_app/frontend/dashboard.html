<!DOCTYPE html>
<html>
<head>
    <title>Order Management Dashboard</title>
    <script src="dashboard.js" defer></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .panel { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        .panel h2 { margin-top: 0; }
        button { margin-bottom: 10px; }
        pre { background: #f5f5f5; padding: 10px; }
    </style>
</head>
<body>
    <h1>Order Management Dashboard</h1>

    <div class="panel admin-only">
        <h2>Users (Admin Only)</h2>
        <button onclick="loadUsers()">Load Users</button>
        <pre id="usersOutput"></pre>
    </div>

    <div class="panel staff-only">
        <h2>Inventory (Staff/Admin)</h2>
        <button onclick="loadInventory()">Load Inventory</button>
        <pre id="inventoryOutput"></pre>
    </div>

    <div class="panel customer-only">
        <h2>My Orders (Customer)</h2>
        <button onclick="loadMyOrders()">Load My Orders</button>
        <pre id="myOrdersOutput"></pre>
    </div>

    <div class="panel staff-only">
        <h2>Low Stock Alerts (Staff/Admin)</h2>
        <button onclick="loadLowStock()">Load Low Stock Alerts</button>
        <pre id="alertsOutput"></pre>
    </div>

    <div class="panel admin-only">
        <h2>Audit Logs (Admin)</h2>
        <button onclick="loadAuditLogs()">Load Audit Logs</button>
        <pre id="auditOutput"></pre>
    </div>
</body>
</html>
