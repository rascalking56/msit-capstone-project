<!DOCTYPE html>
<html>
<head>
    <title>Audit Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="audit_dashboard.js" defer></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        .filter-box { margin-bottom: 20px; }
        pre { background: #f5f5f5; padding: 10px; }
    </style>
</head>
<body>

<h1>Audit Dashboard</h1>

<div class="filter-box">
    <label>User:</label>
    <input id="filterUser" type="text">

    <label>Action:</label>
    <input id="filterAction" type="text">

    <label>Start:</label>
    <input id="filterStart" type="datetime-local">

    <label>End:</label>
    <input id="filterEnd" type="datetime-local">

    <button onclick="applyFilters()">Apply Filters</button>
</div>

<h2>Audit Log Results</h2>
<pre id="auditOutput"></pre>

<h2>Suspicious Activity</h2>
<pre id="suspiciousOutput"></pre>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportJSON()">Export JSON</button>

</body>
</html>
